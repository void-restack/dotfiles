name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible dependencies
        run: |
          pip install ansible ansible-lint
          ansible-galaxy install -r ansible/requirements.yml
        working-directory: ansible
      - name: Run ansible-lint
        run: ansible-lint
        working-directory: ansible

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: .chezmoiscripts,private_dot_config/zsh

  chezmoi-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: |
          curl -fsLS https://get.chezmoi.io -o /usr/local/bin/chezmoi
          chmod +x /usr/local/bin/chezmoi
      - name: Validate templates
        run: |
          chezmoi execute-template \
            --init \
            -D email=ci@example.com \
            -D name=CI \
            < .chezmoi.toml.tmpl > /dev/null
      - name: Validate all templates compile
        run: |
          chezmoi execute-template \
            -D email=ci@example.com \
            -D name=CI \
            -D chezmoi.os=linux \
            -D chezmoi.arch=amd64 \
            -D chezmoi.sourceDir=. \
            < dot_zshrc.tmpl > /dev/null
          chezmoi execute-template \
            -D email=ci@example.com \
            -D name=CI \
            -D chezmoi.os=darwin \
            -D chezmoi.arch=arm64 \
            -D chezmoi.sourceDir=. \
            < dot_zshrc.tmpl > /dev/null
