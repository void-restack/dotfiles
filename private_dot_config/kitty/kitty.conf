# ╭───────────────────────────────────╮
# │          Kitty Configuration       │
# ╰───────────────────────────────────╯

# ── Fonts ──────────────────────────────────────────────────────────
# BEGIN_KITTY_FONTS
font_family      family='Berkeley Mono' features='+calt +ss01 +ss04 +ss05'
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 24.0
disable_ligatures never
modify_font cell_height 8px

# ── Cursor ─────────────────────────────────────────────────────────
cursor_trail 1
cursor_shape block
cursor_blink_interval 0

# ── macOS ──────────────────────────────────────────────────────────
macos_option_as_alt both
macos_show_window_title_in none
hide_window_decorations titlebar-only
macos_show_window_title_in none
confirm_os_window_close 2

# ── Window ─────────────────────────────────────────────────────────
remember_window_size yes
enabled_layouts grid:square=1,splits:split_axis=horizontal,stack
placement_strategy center
window_border_width 1pt
window_margin_width 0
window_padding_width 0 6

# ── Tab Bar ────────────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style powerline
tab_bar_min_tabs 2
tab_powerline_style round
active_tab_font_style bold
tab_title_template "{index}:{title}"

# ── Scrollback ─────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager_history_size 64
copy_on_select yes
strip_trailing_spaces smart

# ── Shell ──────────────────────────────────────────────────────────
shell_integration no-cursor

# ── Notifications ──────────────────────────────────────────────────
notify_on_cmd_finish invisible 3.0

# ── Performance ────────────────────────────────────────────────────
repaint_delay 6
input_delay 2

# ── Misc ───────────────────────────────────────────────────────────
enable_audio_bell no
allow_remote_control yes
update_check_interval 0

# ── Theme ─────
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# ╭───────────────────────────────────╮
# │       Keyboard Shortcuts           │
# ╰───────────────────────────────────╯

# Clear defaults for split keys
kitty_mod cmd+shift

# ── Window Splits (equal by default) ───────────────────────────────
# Smart split: auto-pick axis based on window shape
map cmd+enter  launch --location=split --cwd=current
# Explicit horizontal/vertical splits
map cmd+backslash launch --location=vsplit --cwd=current
map cmd+-      launch --location=hsplit --cwd=current
# Close window
map cmd+w      close_window

# ── Window Navigation (vim-style) ─────────────────────────────────
map cmd+h      neighboring_window left
map cmd+j      neighboring_window down
map cmd+k      neighboring_window up
map cmd+l      neighboring_window right

# ── Window Resize ──────────────────────────────────────────────────
map cmd+left   resize_window narrower
map cmd+right  resize_window wider
map cmd+up     resize_window taller
map cmd+down   resize_window shorter
# Equalize all windows in tab (reset to equal)
map cmd+shift+= resize_window reset
# Quick bias: make focused window take 70%/30%
map cmd+shift+b layout_action bias 70

# ── Font Size ───────────────────────────────────────────────────────
map cmd+plus       change_font_size all +1.0
map cmd+minus      change_font_size all -1.0
map cmd+0          change_font_size all 0

# ── Window Move / Swap ────────────────────────────────────────────
map cmd+shift+h move_window left
map cmd+shift+j move_window down
map cmd+shift+k move_window up
map cmd+shift+l move_window right

# ── Layout Management ─────────────────────────────────────────────
# Toggle zoom (maximize current window)
map cmd+shift+z  toggle_layout stack
# Toggle between splits and last used layout
map cmd+shift+space last_used_layout
# Rotate the split (swap horizontal ↔ vertical)
map cmd+shift+r  layout_action rotate

# ── Tab Management ─────────────────────────────────────────────────
map cmd+t        new_tab
map cmd+shift+t  set_tab_title
map cmd+shift+]  next_tab
map cmd+shift+[  previous_tab
map cmd+]         move_tab_forward
map cmd+[         move_tab_backward

# ── New OS Window ──────────────────────────────────────────────────
map cmd+n        new_os_window

# ── Reload Config ──────────────────────────────────────────────────
map cmd+shift+f5 load_config_file

# ── Quick Access Terminal ──────────────────────────────────────────
map ctrl+grave_accent toggle_quick_access_terminal

# ── Clipboard ──────────────────────────────────────────────────────
map cmd+shift+y copy_last_command_output
